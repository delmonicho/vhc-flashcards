<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Core SEO -->
    <title>LearnLang — Learn Vietnamese with Flashcards & Quizzes</title>
    <meta name="description"
          content="Study Vietnamese vocabulary with smart flashcards, timed quizzes, and homework mode. Track your progress, master tones, and build your word bank — free for Vietnamese learners." />
    <meta name="keywords"
          content="learn Vietnamese, Vietnamese flashcards, Vietnamese vocabulary quiz, study Vietnamese, Vietnamese language app" />
    <link rel="canonical" href="https://learnlang.day/" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="LearnLang" />
    <meta property="og:url"         content="https://learnlang.day/" />
    <meta property="og:title"       content="LearnLang — Learn Vietnamese with Flashcards & Quizzes" />
    <meta property="og:description" content="Smart flashcards, quizzes, and homework mode for Vietnamese language learners. Free to use." />
    <meta property="og:image"       content="https://learnlang.day/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale"      content="en_US" />
    <meta property="og:locale:alternate" content="vi_VN" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="LearnLang — Learn Vietnamese with Flashcards & Quizzes" />
    <meta name="twitter:description" content="Smart flashcards, quizzes, and homework mode for Vietnamese language learners." />
    <meta name="twitter:image"       content="https://learnlang.day/og-image.png" />

    <!-- hreflang -->
    <link rel="alternate" hreflang="en"        href="https://learnlang.day/" />
    <link rel="alternate" hreflang="vi"        href="https://learnlang.day/" />
    <link rel="alternate" hreflang="x-default" href="https://learnlang.day/" />

    <!-- Icons + PWA -->
    <link rel="icon"             type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180"      href="/apple-touch-icon.png" />
    <link rel="manifest"                              href="/manifest.json" />
    <meta name="theme-color" content="#e11d48" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "LearnLang",
      "url": "https://learnlang.day/",
      "description": "A Vietnamese language learning app with flashcards, vocabulary quizzes, and homework mode for students and self-learners.",
      "applicationCategory": "EducationApplication",
      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "inLanguage": ["en", "vi"],
      "keywords": "Vietnamese, language learning, flashcards, vocabulary, quiz"
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Nunito:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
          rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
