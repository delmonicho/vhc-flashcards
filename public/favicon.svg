<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Petal templates, no fill — applied per <use> so they inherit -->
    <ellipse id="op" cx="50" cy="25" rx="6.5" ry="12"/>
    <ellipse id="mp" cx="50" cy="34" rx="5"   ry="9"/>
    <ellipse id="cp" cx="50" cy="41" rx="3.8" ry="7"/>
  </defs>

  <!-- Radial spokes (12 directions) -->
  <line x1="50" y1="50" x2="50"   y2="10"    stroke="#CC4830" stroke-width="0.6" opacity="0.6"/>
  <line x1="50" y1="50" x2="70"   y2="15.36" stroke="#CC4830" stroke-width="0.6" opacity="0.6"/>
  <line x1="50" y1="50" x2="84.64" y2="30"   stroke="#CC4830" stroke-width="0.6" opacity="0.6"/>
  <line x1="50" y1="50" x2="90"   y2="50"    stroke="#CC4830" stroke-width="0.6" opacity="0.6"/>
  <line x1="50" y1="50" x2="84.64" y2="70"   stroke="#CC4830" stroke-width="0.6" opacity="0.6"/>
  <line x1="50" y1="50" x2="70"   y2="84.64" stroke="#CC4830" stroke-width="0.6" opacity="0.6"/>
  <line x1="50" y1="50" x2="50"   y2="90"    stroke="#CC4830" stroke-width="0.6" opacity="0.6"/>
  <line x1="50" y1="50" x2="30"   y2="84.64" stroke="#CC4830" stroke-width="0.6" opacity="0.6"/>
  <line x1="50" y1="50" x2="15.36" y2="70"   stroke="#CC4830" stroke-width="0.6" opacity="0.6"/>
  <line x1="50" y1="50" x2="10"   y2="50"    stroke="#CC4830" stroke-width="0.6" opacity="0.6"/>
  <line x1="50" y1="50" x2="15.36" y2="30"   stroke="#CC4830" stroke-width="0.6" opacity="0.6"/>
  <line x1="50" y1="50" x2="30"   y2="15.36" stroke="#CC4830" stroke-width="0.6" opacity="0.6"/>

  <!-- Outer petals (12 × 30°) -->
  <use href="#op" fill="#F9A8C9" stroke="#FF6B47" stroke-width="0.5" opacity="0.9"/>
  <use href="#op" fill="#F9A8C9" stroke="#FF6B47" stroke-width="0.5" opacity="0.9" transform="rotate(30 50 50)"/>
  <use href="#op" fill="#F9A8C9" stroke="#FF6B47" stroke-width="0.5" opacity="0.9" transform="rotate(60 50 50)"/>
  <use href="#op" fill="#F9A8C9" stroke="#FF6B47" stroke-width="0.5" opacity="0.9" transform="rotate(90 50 50)"/>
  <use href="#op" fill="#F9A8C9" stroke="#FF6B47" stroke-width="0.5" opacity="0.9" transform="rotate(120 50 50)"/>
  <use href="#op" fill="#F9A8C9" stroke="#FF6B47" stroke-width="0.5" opacity="0.9" transform="rotate(150 50 50)"/>
  <use href="#op" fill="#F9A8C9" stroke="#FF6B47" stroke-width="0.5" opacity="0.9" transform="rotate(180 50 50)"/>
  <use href="#op" fill="#F9A8C9" stroke="#FF6B47" stroke-width="0.5" opacity="0.9" transform="rotate(210 50 50)"/>
  <use href="#op" fill="#F9A8C9" stroke="#FF6B47" stroke-width="0.5" opacity="0.9" transform="rotate(240 50 50)"/>
  <use href="#op" fill="#F9A8C9" stroke="#FF6B47" stroke-width="0.5" opacity="0.9" transform="rotate(270 50 50)"/>
  <use href="#op" fill="#F9A8C9" stroke="#FF6B47" stroke-width="0.5" opacity="0.9" transform="rotate(300 50 50)"/>
  <use href="#op" fill="#F9A8C9" stroke="#FF6B47" stroke-width="0.5" opacity="0.9" transform="rotate(330 50 50)"/>

  <!-- Mid petals (8 × 45°) -->
  <use href="#mp" fill="#F08090" stroke="#D04060" stroke-width="0.5" opacity="0.92"/>
  <use href="#mp" fill="#F08090" stroke="#D04060" stroke-width="0.5" opacity="0.92" transform="rotate(45 50 50)"/>
  <use href="#mp" fill="#F08090" stroke="#D04060" stroke-width="0.5" opacity="0.92" transform="rotate(90 50 50)"/>
  <use href="#mp" fill="#F08090" stroke="#D04060" stroke-width="0.5" opacity="0.92" transform="rotate(135 50 50)"/>
  <use href="#mp" fill="#F08090" stroke="#D04060" stroke-width="0.5" opacity="0.92" transform="rotate(180 50 50)"/>
  <use href="#mp" fill="#F08090" stroke="#D04060" stroke-width="0.5" opacity="0.92" transform="rotate(225 50 50)"/>
  <use href="#mp" fill="#F08090" stroke="#D04060" stroke-width="0.5" opacity="0.92" transform="rotate(270 50 50)"/>
  <use href="#mp" fill="#F08090" stroke="#D04060" stroke-width="0.5" opacity="0.92" transform="rotate(315 50 50)"/>

  <!-- Core petals (6 × 60°) -->
  <use href="#cp" fill="#FF6B47" stroke="#CC4A28" stroke-width="0.5" opacity="0.95"/>
  <use href="#cp" fill="#FF6B47" stroke="#CC4A28" stroke-width="0.5" opacity="0.95" transform="rotate(60 50 50)"/>
  <use href="#cp" fill="#FF6B47" stroke="#CC4A28" stroke-width="0.5" opacity="0.95" transform="rotate(120 50 50)"/>
  <use href="#cp" fill="#FF6B47" stroke="#CC4A28" stroke-width="0.5" opacity="0.95" transform="rotate(180 50 50)"/>
  <use href="#cp" fill="#FF6B47" stroke="#CC4A28" stroke-width="0.5" opacity="0.95" transform="rotate(240 50 50)"/>
  <use href="#cp" fill="#FF6B47" stroke="#CC4A28" stroke-width="0.5" opacity="0.95" transform="rotate(300 50 50)"/>

  <!-- Glowing center: orange → golden → cream -->
  <circle cx="50" cy="50" r="6.5" fill="#FF6030" opacity="0.95"/>
  <circle cx="50" cy="50" r="4.5" fill="#FFB830"/>
  <circle cx="50" cy="50" r="2"   fill="#FFF0A0"/>
</svg>
